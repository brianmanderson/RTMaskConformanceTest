name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests / py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: ruff check src

      - name: Run tests
        run: pytest -v

      - name: CLI smoke test (generate then verify)
        shell: bash
        run: |
          python -m rtmask_conformance.cli generate ./fixture --n-quadrature 2
          python -m rtmask_conformance.cli verify \
              --predictions ./fixture/groundtruth \
              --groundtruth ./fixture/groundtruth
